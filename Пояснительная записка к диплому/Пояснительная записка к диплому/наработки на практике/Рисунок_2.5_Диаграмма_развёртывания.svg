<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="850" version="1.1" viewBox="0 0 1100 850" width="1100" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs><style type="text/css"><![CDATA[
        .title { font-family: 'Times New Roman', serif; font-size: 18px; font-weight: bold; text-anchor: middle; fill: #000; }
        .node-border { fill: #f8f9fa; stroke: #333; stroke-width: 2; rx: 10; }
        .node-header { fill: #e2e6ea; stroke: #333; stroke-width: 1; font-family: 'Times New Roman', serif; font-size: 16px; font-weight: bold; text-anchor: middle; }
        .list-title { font-family: 'Arial', sans-serif; font-size: 13px; font-weight: bold; fill: #004085; }
        .list-item { font-family: 'Arial', sans-serif; font-size: 12px; fill: #333; }
        .connection-label { font-family: 'Times New Roman', serif; font-size: 13px; font-weight: bold; text-anchor: middle; fill: #000; }
        .bg { fill: white; }
    ]]></style><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="10" refY="5" viewBox="0 0 10 10"><path d="M 0 0 L 10 5 L 0 10 z" fill="#333" /></marker></defs><rect class="bg" height="850" width="1100" x="0" y="0" /><rect class="node-border" height="750" width="480" x="50" y="50" /><rect fill="#e2e6ea" height="40" stroke="#333" stroke-width="1" width="480" x="50" y="50" /><text class="node-header" x="290.0" y="75">АРМ Сотрудника (Клиент)</text><text class="list-title" x="65" y="110">Основные файлы и настройки:</text><text class="list-item" x="75" y="130">• Точка входа в программу (main.py)</text><text class="list-item" x="75" y="148">• Модуль запуска приложения</text><text class="list-item" x="75" y="166">• Инициализация структуры базы данных</text><text class="list-item" x="75" y="184">• Отладочный модуль</text><text class="list-title" x="65" y="214">Модули интерфейса пользователя:</text><text class="list-item" x="75" y="234">• Главное окно программы</text><text class="list-item" x="75" y="252">• Окно входа в систему</text><text class="list-item" x="75" y="270">• Окно детальной карточки</text><text class="list-item" x="75" y="288">• Окно восстановления записей</text><text class="list-item" x="75" y="306">• Управление учётными записями</text><text class="list-title" x="65" y="336">Вкладки рабочих данных:</text><text class="list-item" x="75" y="356">• Социально-демографические данные</text><text class="list-item" x="75" y="374">• Адреса проживания</text><text class="list-item" x="75" y="392">• Места службы</text><text class="list-item" x="75" y="410">• Входящие поручения</text><text class="list-item" x="75" y="428">• Эпизоды самовольного оставления</text><text class="list-item" x="75" y="446">• Исходящие запросы</text><text class="list-title" x="65" y="476">Документооборот и вспомогательная логика:</text><text class="list-item" x="75" y="496">• Генератор процессуальных документов</text><text class="list-item" x="75" y="514">• Экспорт в электронные таблицы</text><text class="list-item" x="75" y="532">• Журнал аудита действий пользователей</text><text class="list-item" x="75" y="550">• Система автодополнения полей</text><text class="list-item" x="75" y="568">• Менеджер сопоставлений полей шаблонов</text><rect class="node-border" height="750" width="480" x="570" y="50" /><rect fill="#e2e6ea" height="40" stroke="#333" stroke-width="1" width="480" x="570" y="50" /><text class="node-header" x="810.0" y="75">Сервер Базы Данных (Сервер)</text><text class="list-title" x="585" y="110">Система управления базами данных:</text><text class="list-item" x="595" y="130">• Среда выполнения СУБД (версия 16)</text><text class="list-title" x="585" y="155">Схема данных (krd):</text><text class="list-item" x="595" y="175">• Таблицы основных сущностей (КРД, соц. данные)</text><text class="list-item" x="595" y="193">• Таблицы справочников (Звания, Категории)</text><text class="list-item" x="595" y="211">• Таблицы документооборота (Шаблоны, Запросы)</text><text class="list-item" x="595" y="229">• Таблицы безопасности (Пользователи, Роли)</text><text class="list-title" x="585" y="254">Механизмы хранения:</text><text class="list-item" x="595" y="274">• Индексы для ускоренного поиска</text><text class="list-item" x="595" y="292">• Бинарные поля для хранения файлов</text><text class="list-item" x="595" y="310">• Поля формата JSON для гибких структур</text><text class="list-title" x="585" y="335">Безопасность и контроль:</text><text class="list-item" x="595" y="355">• Ограничения целостности данных</text><text class="list-item" x="595" y="373">• Разграничение прав доступа</text><text class="list-item" x="595" y="391">• Хэширование паролей</text><line marker-end="url(#arrow)" stroke="#333" stroke-width="2" x1="530" x2="570" y1="425.0" y2="425.0" /><rect fill="#ffffff" height="30" stroke="none" width="200" x="450.0" y="410.0" /><text class="connection-label" x="550.0" y="430.0">Локальная вычислительная сеть</text></svg>