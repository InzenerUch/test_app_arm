name: Build Windows EXE

on:
  push:
    branches: [ main, master, release ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: 'x64'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller Pillow

      - name: Download PostgreSQL libpq.dll
        run: |
          curl -L -o libpq.zip "https://ftp.postgresql.org/pub/binary/v16.13/win32/libpq-16.13-1.zip"
          powershell -Command "Expand-Archive -Path libpq.zip -DestinationPath . -Force"
          Remove-Item libpq.zip

      - name: Verify icon exists
        run: |
          if (Test-Path "assets/app_icon.ico") {
            Write-Host "✅ Иконка найдена: assets/app_icon.ico"
          } else {
            Write-Host "❌ Иконка НЕ найдена! Сборка продолжится без иконки."
          }

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name "ARM_Doznanie" `
                      --icon=assets/app_icon.ico `
                      --add-data "assets/app_icon.ico;assets" `
                      --collect-all PyQt6 `
                      --add-data "config;config" `
                      --add-binary "libpq.dll;." `
                      --hidden-import bcrypt `
                      --hidden-import cryptography.fernet `
                      --hidden-import openpyxl `
                      --hidden-import docx `
                      --hidden-import graphviz `
                      run_app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ARM_Doznanie-Windows
          path: dist/